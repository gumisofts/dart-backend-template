name: my_app
description: A Dart backend application built with the Gisila stack.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.3.4

dependencies:
  dart_jsonwebtoken: any
  dotenv: ^4.2.0
  gisila:
    path: ../gisila
  gisila_doc:
    path: ../gisila_doc
  gisila_orm:
    path: ../gisila_orm
  gisila_studio:
    path: ../gisila_studio
  http_parser: ^4.0.2
  logger: ^2.2.0
  mime: ^1.0.4
  postgres: any
  shelf: ^1.4.1
  shelf_hotreload: ^1.3.0
  shelf_router: ^1.1.4
  shelf_static: ^1.1.2

dependency_overrides:
  gisila:
    path: ../gisila
  gisila_orm:
    path: ../gisila_orm

dev_dependencies:
  build_runner: any
  lints: ^3.0.0
  test: ^1.24.0
